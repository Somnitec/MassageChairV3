[env:chair_system]
platform = atmelavr
board = leonardo
framework = arduino

build_flags = -Os -flto

lib_deps =
    fastled/FastLED
    thomasfredericks/Bounce2
    bblanchon/ArduinoJson
    pfeerick/elapsedMillis

; Upload via socat TCP bridge: socat TCP-LISTEN:7000,reuseaddr,fork FILE:/dev/ttyACM0,b115200,raw,echo=0
; avrdude won't be able to auto-reset via DTR through socat — press the Arduino reset button
; just before running: pio run -t upload
upload_port = net:massagechair:7000
upload_protocol = avr109
upload_speed = 57600
