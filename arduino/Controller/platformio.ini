[env:teensylc]
platform = teensy
board = teensylc
framework = arduino
upload_protocol = teensy-cli

lib_deps =
    thomasfredericks/Bounce2
    olikraus/U8g2
    bblanchon/ArduinoJson
    pfeerick/elapsedMillis

; Direct USB upload: pio run -t upload
; Teensy's HalfKay bootloader is USB HID, not a serial port, so the old
; socat TCP bridge (net:massagechair:7000) used for the Mega can't carry
; the upload the same way. Uploading over the network later will need
; either `pio run -t upload` run on the host itself (e.g. over ssh) or a
; USB-over-IP bridge — not a plain serial socat relay.
