[env:megaatmega2560]
platform = atmelavr
board = megaatmega2560
framework = arduino

lib_deps =
    thomasfredericks/Bounce2
    olikraus/U8g2
    bblanchon/ArduinoJson
    pfeerick/elapsedMillis

; Upload via socat TCP bridge — adjust port if Controller is on a different ttyACM/port
; Press the Arduino reset button just before: pio run -t upload
upload_port = net:massagechair:7000
upload_protocol = wiring
upload_speed = 115200
